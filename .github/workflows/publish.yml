name: Publish text → rebuild site

# Körs i TEXT-repot (Avanoro/www-fliqpay-text).
# När någon content.json ändras på main så:
# 1. Rensas jsDelivr-cachen
# 2. Triggas en rebuild av huvudsidan via Cloudflare Deploy Hook

on:
  push:
    branches: [main]
    paths:
      - "**/*.json"
  workflow_dispatch: {}     # Kan köras manuellt

concurrency:
  group: publish-text
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Purge all content.json from jsDelivr
        run: |
          set -euo pipefail

          found=0
          while IFS= read -r -d '' f; do
            found=1
            rel="${f#./}"
            url="https://purge.jsdelivr.net/gh/${GITHUB_REPOSITORY}@main/${rel}"
            echo "Purging: $url"

            for attempt in 1 2 3; do
              code=$(curl -s -o /tmp/purge.out -w "%{http_code}" "$url" || true)
              cat /tmp/purge.out; echo
              if [ "$code" = "200" ]; then break; fi
              echo "  attempt $attempt got HTTP $code, retrying..."
              sleep 5
            done
          done < <(find . -name 'content.json' -not -path '*/.git/*' -print0)

          if [ "$found" = "0" ]; then
            echo "No content.json files found — nothing to purge."
          fi

      - name: Wait for purge to propagate
        run: sleep 20

      - name: Trigger Cloudflare Pages deploy hook
        env:
          DEPLOY_HOOK: ${{ secrets.CF_PAGES_DEPLOY_HOOK }}
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_HOOK:-}" ]; then
            echo "::error::Secret CF_PAGES_DEPLOY_HOOK is not set."
            exit 1
          fi

          echo "Triggering Cloudflare Pages deploy hook..."

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$DEPLOY_HOOK")
          BODY=$(echo "$RESPONSE" | head -n -1)
          STATUS=$(echo "$RESPONSE" | tail -n 1)

          echo "Response body: $BODY"
          echo "HTTP status: $STATUS"

          if [[ "$STATUS" != "200" && "$STATUS" != "201" ]]; then
            echo "::error::Deploy hook failed with HTTP $STATUS"
            exit 1
          fi

          echo "✅ Deploy hook triggered successfully. Cloudflare will now rebuild the site."
