name: Publish text → rebuild site

# Runs in the TEXT repo (Avanoro/www-fliqpay-text).
#
# Purpose:
# When content JSON files are changed, trigger a rebuild of the main site
# via Cloudflare Pages Deploy Hook.
#
# Note:
# The site no longer relies on jsDelivr for text content (build-i18n.js
# fetches directly from raw.githubusercontent.com). Therefore the old
# jsDelivr purge step has been removed.

on:
  push:
    branches: [main]
    paths:
      - "**/*.json"
  workflow_dispatch: {}

concurrency:
  group: publish-text
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger Cloudflare Pages deploy hook
        env:
          DEPLOY_HOOK: ${{ secrets.CF_PAGES_DEPLOY_HOOK }}
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_HOOK:-}" ]; then
            echo "::error::Secret CF_PAGES_DEPLOY_HOOK is not set."
            exit 1
          fi

          echo "Triggering Cloudflare Pages deploy hook..."

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$DEPLOY_HOOK")
          BODY=$(echo "$RESPONSE" | head -n -1)
          STATUS=$(echo "$RESPONSE" | tail -n 1)

          echo "Response body: $BODY"
          echo "HTTP status: $STATUS"

          if [[ "$STATUS" != "200" && "$STATUS" != "201" ]]; then
            echo "::error::Deploy hook failed with HTTP $STATUS"
            exit 1
          fi

          echo "✅ Deploy hook triggered successfully."
